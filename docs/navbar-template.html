<!-- ═══════════════════════════════════════════════════════════════════════════
     Global Navigation Bar Component
     Include this at the top of the <body> tag on every page
     ═════════════════════════════════════════════════════════════════════════════ -->

<nav id="navbar" class="navbar">
  <div class="navbar-container">
    <!-- Left Section: Back Button & Brand -->
    <div class="navbar-left">
      <button
        class="back-button"
        onclick="goBack()"
        title="Go back to previous page"
        aria-label="Go back"
      >
        ←
      </button>
      <a href="/index.html" class="navbar-brand">
        <img src="/images/logo.jpg" alt="Maidanja WiFi" />
        <span class="hidden sm:inline">Maidanja WiFi</span>
      </a>
    </div>

    <!-- Center Section: Page Title -->
    <div class="navbar-center">
      <h1 class="navbar-title">Loading...</h1>
    </div>

    <!-- Right Section: Navigation Items & Mobile Menu -->
    <div class="navbar-right">
      <button id="mobile-menu-btn" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div id="nav-items" class="hidden sm:flex">
        <!-- Populated by navbar.js based on auth state -->
      </div>
    </div>
  </div>
</nav>

<!-- CSS & JS Dependencies -->
<link rel="stylesheet" href="/css/navbar.css" />
<script src="/js/navbar.js"></script>
