<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Connected | Maidanja WiFi</title>
    <script src="/js/api.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes ripple {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      .ripple-effect { animation: ripple 2s cubic-bezier(0, 0.2, 0.8, 1) infinite; }
      .glass-panel {
        background: rgba(18, 18, 26, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .inner-glow { box-shadow: inset 0 0.5px 0 0 rgba(255, 255, 255, 0.05); }
      .cyan-violet-gradient { background: linear-gradient(135deg, #00d4ff 0%, #6001d1 100%); }
      .timer-glow { filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4)); }
      @keyframes pulse-green {
        0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
        100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
      }
      .status-pulse { animation: pulse-green 2s infinite; }
    </style>
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
  </head>
  <body class="bg-background text-on-surface min-h-screen font-body-md relative overflow-x-hidden">
    <!-- Global Navigation Bar -->
    <nav id="navbar" class="navbar">
      <div class="navbar-container">
        <div class="navbar-left">
          <button class="back-button" onclick="goBack()" title="Go back">←</button>
          <a href="/index.html" class="navbar-brand">
            <img src="/images/logo.jpg" alt="Maidanja WiFi" />
            <span class="hidden sm:inline">Maidanja WiFi</span>
          </a>
        </div>
        <div class="navbar-center">
          <h1 class="navbar-title">Connected</h1>
        </div>
        <div class="navbar-right">
          <button id="mobile-menu-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <div id="nav-items" class="hidden sm:flex"></div>
        </div>
      </div>
    </nav>

    <main class="relative z-10 pt-28 pb-20 px-margin-mobile">
      <div class="max-w-xl mx-auto flex flex-col items-center">
        <!-- Success Hero Section -->
        <section class="text-center mb-xl">
          <div class="relative w-24 h-24 mb-md mx-auto flex items-center justify-center">
            <div class="absolute inset-0 bg-green-500/20 rounded-full ripple-effect"></div>
            <div class="relative w-16 h-16 bg-green-500 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(34,197,94,0.4)]">
              <span class="material-symbols-outlined text-white text-4xl font-bold">check</span>
            </div>
          </div>
          <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">You're Connected! 🎉</h1>
          <p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">
            Enjoy your internet session. Your time starts now.
          </p>
        </section>

        <!-- Main Countdown Session Card -->
        <div class="w-full glass-panel inner-glow rounded-2xl p-xl flex flex-col items-center mb-lg">
          <div class="relative w-56 h-56 mb-lg">
            <svg class="w-full h-full -rotate-90 transform" viewBox="0 0 100 100">
              <circle cx="50" cy="50" fill="transparent" r="46" stroke="rgba(255,255,255,0.05)" stroke-width="6"></circle>
              <circle class="timer-glow transition-all duration-1000" cx="50" cy="50" fill="transparent" r="46" stroke="url(#timerGradient)" stroke-dasharray="289" stroke-dashoffset="0" stroke-linecap="round" stroke-width="6"></circle>
              <defs>
                <linearGradient id="timerGradient" x1="0%" x2="100%" y1="0%" y2="100%">
                  <stop offset="0%" stop-color="#00d4ff"></stop>
                  <stop offset="100%" stop-color="#6001d1"></stop>
                </linearGradient>
              </defs>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
              <span id="countdown" class="font-display-lg text-display-lg text-on-surface tracking-tighter">--:--:--</span>
              <span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-1">Remaining</span>
            </div>
          </div>
          <div class="w-full grid grid-cols-2 gap-md pt-lg border-t border-white/5">
            <div class="flex flex-col">
              <span class="text-on-surface-variant text-[12px] font-medium uppercase tracking-tight">Expires at</span>
              <span id="expires-at" class="font-body-md text-body-md text-on-surface font-semibold">—</span>
            </div>
            <div class="flex flex-col text-right">
              <span class="text-on-surface-variant text-[12px] font-medium uppercase tracking-tight">Speed</span>
              <span id="session-speed" class="font-body-md text-body-md text-primary font-semibold">—</span>
            </div>
          </div>
        </div>

        <!-- Stats Bento Row -->
        <div class="w-full grid-auto-fit gap-md mb-xl">
          <div class="glass-panel inner-glow rounded-2xl p-md flex flex-col">
            <span class="text-[12px] text-on-surface-variant uppercase font-bold tracking-tight mb-xs">Data Used</span>
            <div class="flex items-baseline gap-xs">
              <span id="data-used" class="font-headline-md text-headline-md text-on-surface">0</span>
              <span class="font-label-md text-label-md text-on-surface-variant">MB</span>
            </div>
          </div>
          <div class="glass-panel inner-glow rounded-2xl p-md flex flex-col">
            <span class="text-[12px] text-on-surface-variant uppercase font-bold tracking-tight mb-xs">Session Start</span>
            <span id="session-start" class="font-headline-md text-headline-md text-on-surface">—</span>
          </div>
          <div class="glass-panel inner-glow rounded-2xl p-md flex flex-col items-start">
            <span class="text-[12px] text-on-surface-variant uppercase font-bold tracking-tight mb-xs">Status</span>
            <div class="flex items-center gap-sm mt-xs">
              <div class="w-2.5 h-2.5 bg-green-400 rounded-full status-pulse"></div>
              <span class="font-label-md text-label-md text-green-400 font-bold">Active</span>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full flex flex-col gap-md">
          <button onclick="window.location.href = 'packages.html'" class="cyan-violet-gradient w-full py-md rounded-xl font-headline-md text-white shadow-[0_8px_30px_rgb(0,212,255,0.2)] active:scale-95 transition-transform">
            Buy More Time
          </button>
        </div>
      </div>
    </main>

    <footer class="bg-surface dark:bg-surface border-t border-white/5 w-full mt-auto">
      <div class="flex flex-col md:flex-row justify-between items-center py-lg w-full container-responsive">
        <div class="flex flex-col items-center md:items-start mb-lg md:mb-0">
          <div class="font-headline-md text-headline-md text-primary font-bold mb-xs">Maidanja WiFi</div>
          <p class="font-body-md text-body-md text-on-surface-variant">© 2026 Maidanja WiFi. Powered by M-Pesa.</p>
        </div>
      </div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (!api.isLoggedIn()) {
          window.location.href = "/login.html";
          return;
        }

        let countdownInterval = null;
        const countdownEl = document.getElementById("countdown");
        const expiresAtEl = document.getElementById("expires-at");
        const sessionStartEl = document.getElementById("session-start");
        const sessionSpeedEl = document.getElementById("session-speed");
        const dataUsedEl = document.getElementById("data-used");
        const timerCircle = document.querySelector(".timer-glow");

        function formatCountdown(secondsRemaining) {
          if (secondsRemaining <= 0) return "00:00:00";
          const h = Math.floor(secondsRemaining / 3600);
          const m = Math.floor((secondsRemaining % 3600) / 60);
          const s = Math.floor(secondsRemaining % 60);
          return [h, m, s].map((v) => String(v).padStart(2, "0")).join(":");
        }

        function updateTimerCircle(remaining, total) {
          if (!timerCircle) return;
          const percentage = Math.max(0, remaining / total);
          const dashArray = 289; 
          const offset = dashArray * (1 - percentage);
          timerCircle.style.strokeDashoffset = offset;
        }

        function startCountdown(expiresAt, startedAt) {
          const totalDuration = (new Date(expiresAt) - new Date(startedAt)) / 1000;
          
          const tick = () => {
            const now = Date.now();
            const remaining = Math.max(0, (new Date(expiresAt) - now) / 1000);
            
            if (countdownEl) countdownEl.textContent = formatCountdown(remaining);
            updateTimerCircle(remaining, totalDuration);

            if (remaining <= 0) {
              clearInterval(countdownInterval);
              if (countdownEl) countdownEl.textContent = "EXPIRED";
              setTimeout(() => (window.location.href = "/packages.html"), 3000);
            }
          };

          tick();
          countdownInterval = setInterval(tick, 1000);
        }

        (async () => {
          try {
            const res = await api.get("/sessions/active");
            const session = res.data.session;

            if (!session) {
              window.location.href = "/packages.html";
              return;
            }

            // Start Time
            if (sessionStartEl) {
              sessionStartEl.textContent = new Date(session.started_at).toLocaleTimeString("en-KE", {
                hour: "2-digit",
                minute: "2-digit",
              });
            }

            // End Time
            if (expiresAtEl) {
              expiresAtEl.textContent = new Date(session.expires_at).toLocaleString("en-KE", {
                hour: "2-digit",
                minute: "2-digit",
                day: "2-digit",
                month: "short",
              });
            }

            // Speed & Data
            if (sessionSpeedEl) sessionSpeedEl.textContent = `${session.speed_mbps || 0} Mbps`;
            if (dataUsedEl) dataUsedEl.textContent = parseFloat(session.data_used_mb || 0).toFixed(1);

            // Start Countdown
            startCountdown(session.expires_at, session.started_at);

          } catch (err) {
            console.error("Session load error:", err.message);
          }
        })();
      });

      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = "/index.html";
        }
      }
    </script>
  </body>
</html>
