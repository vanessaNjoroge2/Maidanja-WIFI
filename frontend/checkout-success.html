<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful | Maidanja WiFi</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/navbar.css" />
  <link rel="stylesheet" href="/css/globals.css" />
  <script src="/js/api.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'mn-navy': '#1B3A6B', 'mn-blue': '#1E88C7', 'mn-orange': '#F4901E',
            'mn-amber': '#FDB912', 'mn-paper': '#FAFBFC', 'mn-ink': '#2B3245', 'mn-grey': '#6B7280',
          },
          fontFamily: { sans: ['Manrope', 'sans-serif'] }
        }
      }
    };
  </script>

  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background: #FAFBFC;
      color: #2B3245;
    }

    .mi {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-flex;
      align-items: center;
    }

    /* Burst animation */
    @keyframes burst {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      60% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .burst {
      animation: burst 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .fade-up {
      animation: fade-up 0.5s ease both;
    }

    .delay-1 {
      animation-delay: 0.15s;
    }

    .delay-2 {
      animation-delay: 0.3s;
    }

    .delay-3 {
      animation-delay: 0.45s;
    }

    .delay-4 {
      animation-delay: 0.6s;
    }

    .success-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(27, 58, 107, 0.1);
      border: 1px solid #E8EDF2;
      max-width: 440px;
      width: 100%;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid #F0F3F7;
      font-size: 0.88rem;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #6B7280;
      font-weight: 600;
    }

    .detail-value {
      color: #2B3245;
      font-weight: 700;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    .btn-dashboard {
      width: 100%;
      min-height: 52px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #1E88C7 0%, #F4901E 100%);
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      font-family: 'Manrope', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-dashboard:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      background: transparent;
      border: 2px solid #D1D9E0;
      color: #2B3245;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: 'Manrope', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      border-color: #1B3A6B;
      background: rgba(27, 58, 107, 0.04);
    }
  </style>
</head>

<body>
  <nav id="navbar" class="navbar">
    <div class="navbar-container">
      <div class="navbar-left">
        <a href="/index.html" class="navbar-brand">
          <img src="/images/logo.png" alt="Maidanja WiFi" />
          <span class="hidden sm:inline">Maidanja WiFi</span>
        </a>
      </div>
      <div class="navbar-center">
        <h1 class="navbar-title">Payment Successful</h1>
      </div>
      <div class="navbar-right">
        <button id="mobile-menu-btn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <div id="nav-items" class="hidden sm:flex"></div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center px-5 py-12">
    <div class="success-card p-8 text-center">

      <!-- Success icon burst -->
      <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-6 burst">
        <span class="mi text-green-500" style="font-size:2.8rem;">check_circle</span>
      </div>

      <h1 class="font-800 text-mn-navy mb-2 fade-up delay-1" style="font-size:1.6rem;">
        You're Connected! 🎉
      </h1>
      <p class="text-mn-grey mb-7 fade-up delay-2" style="font-size:0.95rem;">
        Your WiFi session is now active. Get back to what matters — your studies.
      </p>

      <!-- Receipt details -->
      <div class="bg-mn-paper rounded-2xl p-5 mb-7 text-left fade-up delay-3">
        <p class="text-xs font-700 text-mn-grey uppercase tracking-wider mb-3">Payment Receipt</p>
        <div id="details-container">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Action buttons -->
      <div class="space-y-3 fade-up delay-4">
        <button class="btn-dashboard" onclick="window.location.href='/dashboard.html'">
          <span class="mi" style="font-size:1.1rem;">wifi</span>
          Go to My Dashboard
        </button>
        <button class="btn-secondary" onclick="window.location.href='/packages.html'">
          <span class="mi" style="font-size:1.1rem;">add_shopping_cart</span>
          Buy Another Package
        </button>
      </div>

    </div>
  </main>

  <script src="/js/navbar.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════
       SUCCESS PAGE LOGIC
       Data source: localStorage['maidanja_payment_result']
       ════════════════════════════════════════════════════════ */

    if (!api.isLoggedIn()) { window.location.href = '/login.html'; }

    const result = JSON.parse(localStorage.getItem('maidanja_payment_result') || 'null');
    if (!result) { window.location.href = '/packages.html'; }

    /* ── Render receipt details ── */
    const container = document.getElementById('details-container');

    function row(label, value) {
      return `<div class="detail-row">
    <span class="detail-label">${label}</span>
    <span class="detail-value">${value}</span>
  </div>`;
    }

    const rows = [];

    if (result.mpesa_receipt_number) {
      rows.push(row('M-Pesa Receipt', `<span style="font-family:monospace;">${result.mpesa_receipt_number}</span>`));
    }
    if (result.package_name) {
      rows.push(row('Package', result.package_name));
    }
    if (result.amount_kes) {
      rows.push(row('Amount Paid', `<span style="color:#1B3A6B;">KES ${parseFloat(result.amount_kes).toLocaleString('en-KE')}</span>`));
    }
    if (result.phone_number) {
      rows.push(row('Phone Number', result.phone_number));
    }
    if (result.created_at) {
      rows.push(row('Date', new Date(result.created_at).toLocaleString('en-KE', {
        dateStyle: 'medium', timeStyle: 'short'
      })));
    }

    if (rows.length === 0) {
      rows.push(row('Status', '<span style="color:#16a34a;font-weight:800;">✓ Payment Confirmed</span>'));
    }

    container.innerHTML = rows.join('');

    /* ── Clean up localStorage ── */
    localStorage.removeItem('maidanja_payment');
    localStorage.removeItem('maidanja_package');
  </script>
</body>

</html>
