<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Payment Success | Maidanja WiFi</title>
    <script src="/js/api.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <style>
      .glass-card {
        background: rgba(18, 18, 26, 0.6);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .mesh-bg {
        background-color: #0a0a0f;
        background-image: radial-gradient(at 0% 0%, rgba(0, 212, 255, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(96, 1, 209, 0.15) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(0, 212, 255, 0.1) 0px, transparent 50%);
      }
      .success-glow {
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
      }
    </style>
  </head>
  <body class="bg-background text-on-background font-body-md mesh-bg min-h-screen flex flex-col">
    <!-- Global Navigation Bar -->
    <nav id="navbar" class="navbar">
      <div class="navbar-container">
        <div class="navbar-left">
          <button class="back-button" onclick="window.location.href='/dashboard.html'" title="Dashboard">←</button>
          <a href="/index.html" class="navbar-brand">
            <img src="/images/logo.jpg" alt="Maidanja WiFi" />
            <span class="hidden sm:inline">Maidanja WiFi</span>
          </a>
        </div>
        <div class="navbar-center">
          <h1 class="navbar-title">Success</h1>
        </div>
        <div class="navbar-right">
          <button id="mobile-menu-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <div id="nav-items" class="hidden sm:flex"></div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-margin-mobile pt-24 pb-12">
      <div class="glass-card w-full max-w-md rounded-xl p-xl flex flex-col items-center text-center success-glow relative">
        <!-- Go to Session -->
        <button
          onclick="window.location.href = '/success.html'"
          class="absolute top-6 right-6 flex items-center gap-1 text-on-surface-variant hover:text-primary transition-colors active:scale-95 duration-300"
        >
          <span class="font-label-md text-label-md text-sm">Go to Session</span>
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>

        <!-- Large Checkmark -->
        <div class="w-24 h-24 rounded-full bg-primary-container/20 flex items-center justify-center mb-lg border border-primary-container/30">
          <span class="material-symbols-outlined text-[64px] text-primary-container" style="font-variation-settings: 'FILL' 1">check_circle</span>
        </div>

        <h1 class="font-headline-lg text-headline-lg mb-sm text-primary">Payment Received!</h1>
        <p class="font-body-lg text-body-lg text-on-surface-variant mb-xl">Your connection is now active.</p>

        <!-- Success Details Card -->
        <div class="w-full bg-surface-container-lowest/50 rounded-lg p-md border border-white/5 mb-xl text-left">
          <div class="flex justify-between mb-sm">
            <span class="text-on-surface-variant font-label-md text-label-md">Reference</span>
            <span id="receipt-ref" class="text-on-surface font-label-md text-label-md font-bold">—</span>
          </div>
          <div class="flex justify-between mb-sm">
            <span class="text-on-surface-variant font-label-md text-label-md">Plan</span>
            <span id="receipt-plan" class="text-on-surface font-label-md text-label-md font-bold">—</span>
          </div>
          <div class="flex justify-between mb-sm">
            <span class="text-on-surface-variant font-label-md text-label-md">Amount</span>
            <span id="receipt-amount" class="text-on-surface font-label-md text-label-md font-bold">—</span>
          </div>
          <div class="flex justify-between">
            <span class="text-on-surface-variant font-label-md text-label-md">Status</span>
            <span class="inline-flex items-center gap-xs text-primary-container font-label-md text-label-md font-bold">
              <span class="w-2 h-2 rounded-full bg-primary-container animate-pulse"></span>
              Active
            </span>
          </div>
        </div>

        <!-- Countdown -->
        <div class="flex flex-col items-center gap-sm">
          <div class="w-full h-1 bg-surface-container-high rounded-full overflow-hidden max-w-[200px]">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-primary-container to-secondary-container w-0 transition-all duration-1000"></div>
          </div>
          <p class="font-label-md text-label-md text-on-tertiary-fixed-variant">
            Redirecting in <span id="countdown" class="text-primary font-bold">5</span>s
          </p>
        </div>

        <!-- Manual Action -->
        <button
          onclick="window.location.href = '/success.html'"
          class="mt-xl text-primary font-label-md text-label-md hover:underline decoration-primary/30 transition-all"
        >
          Didn't redirect? Click here to browse
        </button>
      </div>
    </main>

    <footer class="bg-surface dark:bg-surface border-t border-white/5 mt-auto">
      <div class="flex flex-col md:flex-row justify-between items-center py-lg w-full container-responsive">
        <div class="mb-md md:mb-0">
          <span class="font-headline-md text-headline-md text-primary font-bold">Maidanja WiFi</span>
          <p class="text-on-surface-variant text-label-md mt-xs font-label-md">
            © 2026 Maidanja WiFi. Powered by M-Pesa.
          </p>
        </div>
      </div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (!api.isLoggedIn()) {
          window.location.href = "/login.html";
          return;
        }

        // Try to get data from multiple sources for robustness
        const result = JSON.parse(localStorage.getItem("maidanja_payment_result") || "null");
        const payment = JSON.parse(localStorage.getItem("maidanja_payment") || "null");

        console.log("Success Page Data:", { result, payment });

        // Update Reference
        const ref = result?.mpesa_receipt_number || result?.receipt_number || "Completed";
        document.getElementById("receipt-ref").textContent = ref;

        // Update Plan
        const plan = result?.package_name || payment?.package_name || "WiFi Plan";
        document.getElementById("receipt-plan").textContent = plan;

        // Update Amount
        const amountVal = result?.amount_kes || payment?.amount || "0";
        document.getElementById("receipt-amount").textContent = `KES ${parseFloat(amountVal).toLocaleString()}`;

        // Countdown and Progress
        let timeLeft = 5;
        const countdownEl = document.getElementById("countdown");
        const progressEl = document.getElementById("progress-bar");

        const timer = setInterval(() => {
          timeLeft--;
          if (countdownEl) countdownEl.textContent = timeLeft;
          if (progressEl) progressEl.style.width = `${((5 - timeLeft) / 5) * 100}%`;

          if (timeLeft <= 0) {
            clearInterval(timer);
            window.location.href = "/success.html";
          }
        }, 1000);

        // Clear temporary payment data so it doesn't reappear
        // But keep user info
        localStorage.removeItem("maidanja_payment");
        localStorage.removeItem("maidanja_payment_result");
        localStorage.removeItem("maidanja_package");
      });
    </script>
  </body>
</html>
