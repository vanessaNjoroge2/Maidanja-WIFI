<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Maidanja WiFi</title>
  <meta name="description" content="Sign in or create your Maidanja WiFi account to manage sessions and payments." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/api.js"></script>
  <style>
    :root{
      --paper:#FDFBF7; --paper-dim:#F5F1E9;
      --ink:#12172B; --ink-soft:#4B5169; --grey:#6B7085;
      --orange:#F4820A; --orange-dark:#D4690A;
      --line:#E7E1D3; --card:#FFFFFF; --radius:18px;
      --red:#D93025;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
    h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em;}
    a{color:inherit;text-decoration:none;}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;max-width:1140px;margin:0 auto;width:100%;}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;}
    .logo img{height:34px;width:auto;object-fit:contain;}

    /* AUTH CARD */
    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
    .auth-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:40px;width:100%;max-width:440px;box-shadow:0 20px 60px -20px rgba(18,23,43,0.12);}

    .auth-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px;}
    .auth-logo img{height:52px;width:auto;object-fit:contain;}
    .auth-logo h1{font-size:1.4rem;color:var(--ink);text-align:center;}
    .auth-logo p{color:var(--grey);font-size:0.9rem;text-align:center;}

    /* TABS */
    .tabs{display:flex;background:var(--paper-dim);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:28px;}
    .tab{flex:1;padding:10px;border-radius:9px;font-weight:600;font-size:0.9rem;cursor:pointer;border:none;background:transparent;color:var(--grey);font-family:'Inter',sans-serif;transition:all .2s;}
    .tab.active{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(18,23,43,0.08);}

    /* PANEL */
    .panel{display:none;} .panel.active{display:block;}

    /* INPUT */
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:0.85rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap input{
      width:100%;padding:13px 16px 13px 44px;border:1.5px solid var(--line);
      border-radius:12px;font-size:1rem;font-family:'Inter',sans-serif;
      color:var(--ink);background:var(--paper);outline:none;
      transition:border-color .2s,box-shadow .2s;min-height:50px;
    }
    .input-wrap input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,130,10,0.12);background:#fff;}
    .input-wrap input::placeholder{color:#B0B4C0;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey);font-size:1.1rem;pointer-events:none;}
    .input-end{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey);font-size:1.1rem;display:flex;align-items:center;}

    /* PW REQS */
    .pw-reqs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
    .req{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:#9CA3AF;transition:color .2s;}
    .req.met{color:#16a34a;}
    .req-icon{font-size:0.85rem;}

    /* BUTTONS */
    .btn-submit{
      width:100%;min-height:52px;border-radius:12px;border:none;cursor:pointer;
      background:var(--orange);color:#fff;font-weight:700;font-size:1rem;
      font-family:'Space Grotesk',sans-serif;letter-spacing:-0.01em;
      transition:background .2s,transform .15s,box-shadow .2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-submit:hover:not(:disabled){background:var(--orange-dark);transform:translateY(-1px);box-shadow:0 8px 24px -6px rgba(244,130,10,0.4);}
    .btn-submit:disabled{opacity:.55;cursor:not-allowed;}

    /* BANNER */
    .banner{border-radius:12px;padding:12px 16px;font-size:0.875rem;font-weight:600;display:none;align-items:flex-start;gap:8px;margin-bottom:18px;}
    .banner.error{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C;display:flex;}
    .banner.success{background:#FFF7ED;border:1px solid #FED7AA;color:#C2410C;display:flex;}

    /* FOOTER */
    footer{border-top:1px solid var(--line);padding:24px;text-align:center;font-size:0.82rem;color:var(--grey);}
    footer a{color:var(--orange);font-weight:600;}

    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <nav>
    <a href="/index.html" class="logo">
      <img src="/images/logo.png" alt="Maidanja WiFi" />
      Maidanja WiFi
    </a>
    <a href="/packages.html" style="font-size:.9rem;font-weight:600;color:var(--ink-soft);">Browse Packages</a>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/images/logo.png" alt="Maidanja WiFi" />
        <h1>Welcome back</h1>
        <p>Fast campus WiFi for students in Thika</p>
      </div>

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button class="tab active" id="tab-login"    onclick="switchTab('login')"    role="tab">Sign In</button>
        <button class="tab"        id="tab-register" onclick="switchTab('register')" role="tab">Create Account</button>
      </div>

      <!-- Banner -->
      <div class="banner" id="banner" role="alert"></div>

      <!-- LOGIN -->
      <div class="panel active" id="panel-login">
        <form id="form-login" novalidate>
          <div class="field">
            <label for="l-phone">Safaricom Number</label>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input type="tel" id="l-phone" placeholder="07XXXXXXXX or 254XXXXXXXXX" autocomplete="tel" inputmode="tel" required />
            </div>
          </div>
          <div class="field">
            <label for="l-pw">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="l-pw" placeholder="Your password" autocomplete="current-password" required />
              <button type="button" class="input-end" id="toggle-l-pw" aria-label="Show/hide password">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btn-login">Sign In →</button>
          <p style="text-align:center;margin-top:16px;font-size:.88rem;color:var(--grey);">
            New here? <button type="button" onclick="switchTab('register')" style="background:none;border:none;cursor:pointer;color:var(--orange);font-weight:600;font-family:'Inter',sans-serif;">Create an account</button>
          </p>
        </form>
      </div>

      <!-- REGISTER -->
      <div class="panel" id="panel-register">
        <form id="form-register" novalidate>
          <div class="field">
            <label for="r-name">Full Name <span style="color:var(--grey);font-weight:400;">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="r-name" placeholder="e.g. Jane Wanjiku" autocomplete="name" />
            </div>
          </div>
          <div class="field">
            <label for="r-phone">Safaricom Number</label>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input type="tel" id="r-phone" placeholder="07XXXXXXXX or 254XXXXXXXXX" autocomplete="tel" inputmode="tel" required />
            </div>
          </div>
          <div class="field">
            <label for="r-pw">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="r-pw" placeholder="Create a strong password" autocomplete="new-password" required oninput="checkPw()" />
              <button type="button" class="input-end" id="toggle-r-pw" aria-label="Show/hide password">👁</button>
            </div>
            <div class="pw-reqs" id="pw-reqs">
              <div class="req" id="req-len"><span class="req-icon">○</span>8+ characters</div>
              <div class="req" id="req-upper"><span class="req-icon">○</span>Uppercase</div>
              <div class="req" id="req-num"><span class="req-icon">○</span>Number</div>
              <div class="req" id="req-special"><span class="req-icon">○</span>Special char</div>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="btn-register">Create Account →</button>
          <p style="text-align:center;margin-top:16px;font-size:.88rem;color:var(--grey);">
            Already have an account? <button type="button" onclick="switchTab('login')" style="background:none;border:none;cursor:pointer;color:var(--orange);font-weight:600;font-family:'Inter',sans-serif;">Sign in</button>
          </p>
        </form>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Maidanja WiFi · <a href="/index.html">Home</a> · Powered by M-Pesa
  </footer>

<script>
  if (api.isLoggedIn()) {
    const u = api.getUser();
    window.location.href = u?.role === 'admin' ? '/admin.html' : '/packages.html';
  }

  function switchTab(t) {
    ['login','register'].forEach(x => {
      document.getElementById('tab-'+x).classList.toggle('active', x===t);
      document.getElementById('panel-'+x).classList.toggle('active', x===t);
    });
    clearBanner();
  }

  function showBanner(msg, type='error') {
    const el = document.getElementById('banner');
    el.className = 'banner '+type;
    el.innerHTML = `<span>${type==='error'?'⚠️':'✅'}</span><span>${msg}</span>`;
  }
  function clearBanner() { const el=document.getElementById('banner'); el.className='banner'; el.style.display='none'; }

  function setupToggle(inp, btn) {
    document.getElementById(btn).addEventListener('click', () => {
      const i = document.getElementById(inp);
      i.type = i.type==='password' ? 'text' : 'password';
    });
  }
  setupToggle('l-pw','toggle-l-pw');
  setupToggle('r-pw','toggle-r-pw');

  // Auto-switch tab based on URL query parameter (e.g. ?tab=register)
  const params = new URLSearchParams(window.location.search);
  const tab = params.get('tab');
  if (tab === 'register') {
    switchTab('register');
  } else {
    switchTab('login');
  }

  function checkPw() {
    const pw = document.getElementById('r-pw').value;
    const set = (id, ok) => {
      const el = document.getElementById(id);
      el.classList.toggle('met', ok);
      el.querySelector('.req-icon').textContent = ok ? '✓' : '○';
    };
    set('req-len',    pw.length >= 8);
    set('req-upper',  /[A-Z]/.test(pw));
    set('req-num',    /[0-9]/.test(pw));
    set('req-special',/[^A-Za-z0-9]/.test(pw));
  }

  function setLoading(btn, on) {
    const el = document.getElementById(btn);
    el.disabled = on;
    if (!el._orig) el._orig = el.innerHTML;
    el.innerHTML = on ? '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Please wait…' : el._orig;
  }

  document.getElementById('form-login').addEventListener('submit', async e => {
    e.preventDefault(); clearBanner();
    const phone = document.getElementById('l-phone').value.trim();
    const pw    = document.getElementById('l-pw').value;
    if (!phone || !pw) { showBanner('Phone number and password are required.'); return; }
    setLoading('btn-login', true);
    try {
      const res = await api.post('/auth/login', { phone_number: phone, password: pw }, false);
      api.setSession(res.data.token, res.data.user);
      showBanner('Signed in! Redirecting…', 'success');
      setTimeout(() => {
        const u = api.getUser();
        window.location.href = u?.role==='admin' ? '/admin.html' : '/packages.html';
      }, 600);
    } catch(err) {
      showBanner(err.message || 'Login failed. Check your details and try again.');
      setLoading('btn-login', false);
    }
  });

  document.getElementById('form-register').addEventListener('submit', async e => {
    e.preventDefault(); clearBanner();
    const name  = document.getElementById('r-name').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const pw    = document.getElementById('r-pw').value;
    if (!phone || !pw) { showBanner('Phone number and password are required.'); return; }
    
    // Client-side password complexity validation
    const hasLength = pw.length >= 8;
    const hasUpper = /[A-Z]/.test(pw);
    const hasNum = /[0-9]/.test(pw);
    const hasSpecial = /[^A-Za-z0-9]/.test(pw);
    if (!hasLength || !hasUpper || !hasNum || !hasSpecial) {
      showBanner('Password must meet all security requirements (8+ chars, uppercase, number, special character).');
      return;
    }

    const payload = { phone_number: phone, password: pw };
    if (name) payload.name = name;
    setLoading('btn-register', true);
    try {
      const res = await api.post('/auth/register', payload, false);
      api.setSession(res.data.token, res.data.user);
      showBanner('Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = '/packages.html'; }, 800);
    } catch(err) {
      showBanner(err.message || 'Registration failed. Phone may already be registered.');
      setLoading('btn-register', false);
    }
  });
</script>
</body>
</html>
