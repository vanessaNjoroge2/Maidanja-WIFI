<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Verifying Payment | Maidanja WiFi</title>
    <script src="/js/api.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <style>
      @keyframes mesh-drift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .animated-mesh {
        background: linear-gradient(-45deg, #0a0a0f, #13131b, #1b1b23, #08080c);
        background-size: 400% 400%;
        animation: mesh-drift 15s ease infinite;
      }
      .glass-panel {
        background: rgba(18, 18, 26, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .signal-wave {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 2px solid #00d4ff;
        width: 100%;
        height: 100%;
        opacity: 0;
        animation: ripple 2s infinite;
      }
      .signal-wave-delay-1 { animation-delay: 0.6s; }
      .signal-wave-delay-2 { animation-delay: 1.2s; }
      @keyframes ripple {
        0% { width: 80%; height: 80%; opacity: 0.5; }
        100% { width: 250%; height: 250%; opacity: 0; }
      }
      @keyframes spinner { to { transform: rotate(360deg); } }
      .spinner-icon { animation: spinner 1s linear infinite; }
    </style>
  </head>
  <body class="bg-background text-on-background animated-mesh min-h-screen flex flex-col font-body-md overflow-x-hidden">
    <!-- Global Navigation Bar -->
    <nav id="navbar" class="navbar">
      <div class="navbar-container">
        <div class="navbar-left">
          <button class="back-button" onclick="goBack()" title="Go back">←</button>
          <a href="/index.html" class="navbar-brand">
            <img src="/images/logo.jpg" alt="Maidanja WiFi" />
            <span class="hidden sm:inline">Maidanja WiFi</span>
          </a>
        </div>
        <div class="navbar-center">
          <h1 class="navbar-title">Processing Payment</h1>
        </div>
        <div class="navbar-right">
          <button id="mobile-menu-btn" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
          <div id="nav-items" class="hidden sm:flex"></div>
        </div>
      </div>
    </nav>

    <!-- Main Canvas -->
    <main class="flex-grow flex items-center justify-center px-margin-mobile pt-24 pb-xl">
      <div class="w-full max-w-md relative">
        <!-- Contextual Loading Header -->
        <div class="text-center mb-xl">
          <h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Almost There</h1>
          <p class="text-on-surface-variant font-body-md text-body-md">
            Check your phone for the M-Pesa prompt.
          </p>
        </div>

        <!-- Checkout Card -->
        <div class="glass-panel rounded-xl p-lg relative z-10">
          <div class="flex flex-col gap-lg">
            <!-- Package Summary -->
            <div class="flex justify-between items-center bg-surface-container-low p-md rounded-lg border border-white/5">
              <div class="flex flex-col">
                <span class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest">Selected Plan</span>
                <span id="loading-pkg-name" class="text-headline-md font-headline-md text-on-surface">Loading...</span>
              </div>
              <div class="text-right">
                <span id="loading-pkg-price" class="text-headline-md font-headline-md text-primary-container">—</span>
              </div>
            </div>

            <!-- Phone Number -->
            <div class="space-y-md">
              <label class="block text-label-md font-label-md text-on-surface-variant px-xs">M-Pesa Phone Number</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
                  <span class="material-symbols-outlined text-on-surface-variant">phone_iphone</span>
                </div>
                <input id="loading-phone" class="w-full bg-[#08080C] border border-outline-variant text-on-surface-variant rounded-lg py-md pl-12 pr-md font-body-md text-body-md cursor-not-allowed opacity-60" disabled type="text" value="Loading..." />
              </div>
            </div>

            <!-- Pulsing Action Button -->
            <div class="relative flex justify-center py-xl">
              <div class="signal-wave"></div>
              <div class="signal-wave signal-wave-delay-1"></div>
              <div class="signal-wave signal-wave-delay-2"></div>
              <button class="relative z-20 w-full bg-gradient-to-br from-primary-container to-secondary-container text-white py-lg rounded-full font-headline-md text-headline-md flex items-center justify-center gap-md shadow-[0_0_20px_rgba(0,212,255,0.2)]" disabled>
                <span class="material-symbols-outlined spinner-icon">progress_activity</span>
                <span>Verifying Payment...</span>
              </button>
            </div>

            <!-- Instructions -->
            <div class="flex gap-md p-md bg-primary/5 rounded-lg border border-primary/10">
              <span class="material-symbols-outlined text-primary-container">info</span>
              <p class="text-label-md font-label-md text-on-surface-variant">
                Enter your M-Pesa PIN on the pop-up window appearing on your phone to complete the transaction.
              </p>
            </div>

            <!-- Manual Verify (will be appended by script) -->
            <div id="manual-verify-container" class="flex flex-col items-center"></div>
          </div>
        </div>

        <!-- Decorative Blurs -->
        <div class="absolute -top-12 -right-12 w-32 h-32 opacity-20 blur-3xl bg-primary-container rounded-full"></div>
        <div class="absolute -bottom-12 -left-12 w-40 h-40 opacity-10 blur-3xl bg-secondary-container rounded-full"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface dark:bg-surface border-t border-white/5 mt-auto">
      <div class="flex flex-col md:flex-row justify-between items-center py-lg w-full container-responsive">
        <div class="mb-md md:mb-0">
          <span class="font-headline-md text-headline-md text-primary font-bold">Maidanja WiFi</span>
          <p class="text-on-surface-variant text-label-md mt-xs font-label-md">
            © 2026 Maidanja WiFi. Powered by M-Pesa.
          </p>
        </div>
      </div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (!api.isLoggedIn()) {
          window.location.href = "/login.html";
          return;
        }

        const payment = JSON.parse(localStorage.getItem("maidanja_payment") || "null");
        if (!payment?.checkout_request_id) {
          window.location.href = "/packages.html";
          return;
        }

        // Populate UI
        document.getElementById("loading-pkg-name").textContent = payment.package_name || "Package";
        document.getElementById("loading-pkg-price").textContent = payment.amount ? `KES ${parseFloat(payment.amount).toLocaleString()}` : "—";
        document.getElementById("loading-phone").value = payment.phone_number || (api.getUser()?.phone_number ?? "");

        let attempts = 0;
        const MAX_ATTEMPTS = 60;
        let poller;

        async function pollPayment(isManual = false) {
          try {
            const res = await api.get(`/payments/status/${payment.checkout_request_id}`);
            const status = res.data.payment.status;

            if (status === "completed") {
              if (poller) clearInterval(poller);
              localStorage.setItem("maidanja_payment_result", JSON.stringify(res.data.payment));
              window.location.href = "/checkout-success.html";
              return;
            }

            if (status === "failed" || status === "cancelled") {
              if (poller) clearInterval(poller);
              localStorage.setItem("maidanja_payment_result", JSON.stringify(res.data.payment));
              window.location.href = "/checkout-failed.html";
              return;
            }

            if (!isManual) attempts++;
            if (attempts >= MAX_ATTEMPTS) {
              if (poller) clearInterval(poller);
              localStorage.setItem("maidanja_payment_result", JSON.stringify({ 
                error_message: "Verification timed out. If money was deducted, your session will activate shortly. Please check your Dashboard." 
              }));
              window.location.href = "/checkout-failed.html";
            }
          } catch (err) {
            console.warn("Poll error:", err.message);
            if (!isManual) attempts++;
          }
        }

        // Manual Verify Button
        const verifyBtn = document.createElement("button");
        verifyBtn.className = "mt-4 w-full py-2 text-sm text-primary hover:underline transition-all opacity-80 hover:opacity-100";
        verifyBtn.innerHTML = "Having trouble? Click here to verify manually";
        verifyBtn.onclick = () => pollPayment(true);
        document.getElementById("manual-verify-container").appendChild(verifyBtn);

        // Start polling
        setTimeout(() => {
          pollPayment();
          poller = setInterval(pollPayment, 5000);
        }, 3000);
      });
    </script>
  </body>
</html>
