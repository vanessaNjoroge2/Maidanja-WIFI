<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Payment | Maidanja WiFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/api.js"></script>
  <style>
    :root{--paper:#FDFBF7;--paper-dim:#F5F1E9;--ink:#12172B;--ink-soft:#4B5169;--grey:#6B7085;--orange:#F4820A;--orange-dark:#D4690A;--line:#E7E1D3;--card:#FFFFFF;--radius:18px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em;}
    a{color:inherit;text-decoration:none;}
    nav{display:flex;align-items:center;gap:10px;padding:18px 24px;border-bottom:1px solid var(--line);}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;}
    .logo img{height:30px;width:auto;object-fit:contain;}
    .back-btn{background:var(--paper-dim);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:.85rem;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;}
    .back-btn:hover{color:var(--ink);}

    .main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px;}
    .card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:36px;width:100%;max-width:460px;box-shadow:0 20px 60px -20px rgba(18,23,43,.1);}

    .card-header{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
    .card-icon{width:46px;height:46px;border-radius:12px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .card-header h1{font-size:1.25rem;}
    .card-header p{color:var(--grey);font-size:.85rem;}

    .pkg-pill{background:var(--paper-dim);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;}
    .pkg-pill .label{font-size:.75rem;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
    .pkg-pill .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem;}
    .pkg-pill .price{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.4rem;text-align:right;}
    .pkg-pill .via{font-size:.75rem;color:var(--grey);text-align:right;}

    .banner{border-radius:12px;padding:12px 16px;font-size:.875rem;font-weight:600;display:none;align-items:flex-start;gap:8px;margin-bottom:20px;}
    .banner.error{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C;display:flex;}

    .field{margin-bottom:20px;}
    .field label{display:block;font-size:.85rem;font-weight:600;color:var(--ink-soft);margin-bottom:7px;}
    .field-hint{font-size:.78rem;color:var(--grey);margin-top:6px;display:flex;align-items:center;gap:4px;}
    .input-wrap{position:relative;}
    .input-wrap input{width:100%;padding:14px 16px 14px 46px;border:1.5px solid var(--line);border-radius:12px;font-size:1.05rem;font-family:'Inter',sans-serif;color:var(--ink);background:var(--paper);outline:none;transition:border-color .2s,box-shadow .2s;min-height:52px;letter-spacing:.02em;}
    .input-wrap input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,130,10,.12);background:#fff;}
    .input-wrap input::placeholder{color:#B0B4C0;letter-spacing:0;}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey);font-size:1.15rem;pointer-events:none;}

    .btn-pay{width:100%;min-height:54px;border-radius:13px;border:none;cursor:pointer;background:var(--orange);color:#fff;font-weight:700;font-size:1.05rem;font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;transition:background .2s,transform .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:10px;}
    .btn-pay:hover:not(:disabled){background:var(--orange-dark);transform:translateY(-1px);box-shadow:0 10px 28px -6px rgba(244,130,10,.4);}
    .btn-pay:disabled{opacity:.55;cursor:not-allowed;}

    .trust-row{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;padding-top:18px;border-top:1px solid var(--line);margin-top:18px;}
    .trust-item{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--grey);font-weight:600;}
    @keyframes spin{to{transform:rotate(360deg);}}
    footer{border-top:1px solid var(--line);padding:20px 24px;text-align:center;font-size:.82rem;color:var(--grey);}
  </style>
</head>
<body>
  <nav>
    <button class="back-btn" onclick="history.back()">← Back</button>
    <a href="/index.html" class="logo"><img src="/images/logo.png" alt="Maidanja WiFi" />Maidanja WiFi</a>
  </nav>

  <div class="main">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">💳</div>
        <div>
          <h1>Complete Payment</h1>
          <p>Secure M-Pesa STK Push</p>
        </div>
      </div>

      <div class="pkg-pill">
        <div>
          <div class="label">Selected Plan</div>
          <div class="name" id="pkg-name">—</div>
        </div>
        <div>
          <div class="price" id="pkg-price">—</div>
          <div class="via">via M-Pesa</div>
        </div>
      </div>

      <div class="banner" id="banner"></div>

      <div class="field">
        <label for="phone">M-Pesa Phone Number</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input type="tel" id="phone" placeholder="254712345678" inputmode="tel" autocomplete="tel" />
        </div>
        <div class="field-hint">ℹ️ Format: 254 followed by 9 digits (Safaricom only)</div>
      </div>

      <button class="btn-pay" id="btn-pay">
        <span>📲</span> Pay with M-Pesa
      </button>

      <div class="trust-row">
        <div class="trust-item">🔒 Safaricom secured</div>
        <div class="trust-item">⚡ Instant activation</div>
        <div class="trust-item">📞 <a href="tel:0706407084" style="color:var(--orange);">0706407084</a></div>
      </div>
    </div>
  </div>

  <footer>© 2026 Maidanja WiFi · Powered by M-Pesa</footer>

<script>
  if (!api.isLoggedIn()) window.location.href = '/login.html';
  const pkg = JSON.parse(localStorage.getItem('maidanja_package')||'null');
  if (!pkg) window.location.href = '/packages.html';

  document.getElementById('pkg-name').textContent  = pkg?.name || '—';
  document.getElementById('pkg-price').textContent = pkg ? `KES ${parseFloat(pkg.price_kes||pkg.price).toLocaleString('en-KE')}` : '—';

  const user = api.getUser();
  if (user?.phone_number) document.getElementById('phone').value = user.phone_number;

  function showError(msg) {
    const el = document.getElementById('banner');
    el.className = 'banner error';
    el.innerHTML = `<span>⚠️</span><span>${msg}</span>`;
  }

  document.getElementById('btn-pay').addEventListener('click', async () => {
    const phone = document.getElementById('phone').value.trim();
    if (!phone.match(/^254\d{9}$/)) { showError('Enter phone as 254 followed by 9 digits (e.g. 254712345678).'); return; }
    const btn = document.getElementById('btn-pay');
    btn.disabled = true;
    btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Sending STK Push…';
    try {
      const r = await api.post('/payments/initiate', { package_id: pkg.id, phone_number: phone });
      localStorage.setItem('maidanja_payment', JSON.stringify({
        payment_id: r.data.payment_id,
        checkout_request_id: r.data.checkout_request_id,
        package_name: pkg.name,
        amount: pkg.price_kes || pkg.price,
        phone_number: phone,
      }));
      window.location.href = '/checkout-loading.html';
    } catch(err) {
      showError(err.message || 'Payment initiation failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<span>📲</span> Pay with M-Pesa';
    }
  });
</script>
</body>
</html>
